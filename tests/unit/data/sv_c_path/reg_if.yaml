ml-hpi:
  interfaces:
  - name: tb.RegIf
    methods:
    - name: write32
      rtype: void
      params:
      - name: addr
        type: addr64
      - name: data
        type: uint32
      attr:
      - target: true
      - blocking: true
    - name: read32
      rtype: uint32
      params:
      - name: addr
        type: addr64
      attr:
      - target: true
      - blocking: true
